permissions:
  default:
    _type: default-block
    allow: []
  consumers:
    ADMIN:
      _type: default-allow
      block: []
    USER:
      _type: default-block
      allow:
        - finance-reads
    accountant:
      _type: default-block
      consumerGroupKey: accountant Profile
      allow:
        - finance-reads
    marketing:
      _type: default-block
      allow:
        - marketing-reads
    sales:
      _type: default-block
      allow:
        - sales-read
    hr:
      _type: default-block
      allow:
        - sales-read
  clientNames: {}
toolGroups:
  - name: finance-reads
    description: Financial and sales analytics
    services:
      erp:
        - dashboard_kpis
        - sales_summary
        - top_products
        - whats_my_role
  - name: marketing-reads
    description: Product performance and reference data
    services:
      erp:
        - top_products
        - list_branches
        - list_warehouses
        - whats_my_role
  - name: sales-read
    services:
      erp:
        - top_products
auth:
  enabled: true
  mode: oidc
  header: x-lunar-api-key
  oidc:
    issuer: http://100.88.11.69:8081/realms/tenant-b
    audience: http://host.docker.internal:9000/mcp
    rolesClaim: groups
    resource: http://host.docker.internal:9000/mcp
toolExtensions:
  services: {}
targetServerAttributes: {}
skills:
  enabled: []
