permissions:
  default:
    _type: default-block
    allow: []
  consumers:
    ADMIN:
      block: []
    USER:
      _type: default-block
      allow:
        - finance-reads
    accountant:
      _type: default-block
      consumerGroupKey: accountant Profile
      allow:
        - finance-reads
    marketing:
      _type: default-block
      allow:
        - marketing-reads
  clientNames: {}
toolGroups:
  - name: finance-reads
    description: Financial and sales analytics
    services:
      erp:
        - dashboard_kpis
        - sales_summary
        - top_products
        - whats_my_role
  - name: marketing-reads
    description: Product performance and reference data
    services:
      erp:
        - top_products
        - list_branches
        - list_warehouses
        - whats_my_role
auth:
  enabled: true
  mode: oidc
  header: x-lunar-api-key
  oidc:
    # Issuer = Keycloak's browser+container-reachable Tailscale URL (must match
    # KC_HOSTNAME). audience/resource are just identifiers (they need to match
    # the token's aud, not be reachable), so they stay on the container name.
    issuer: http://100.88.11.69:8081/realms/tenant-a
    audience: http://host.docker.internal:9000/mcp
    rolesClaim: groups
    resource: http://host.docker.internal:9000/mcp
toolExtensions:
  services: {}
targetServerAttributes: {}
skills:
  enabled: []
